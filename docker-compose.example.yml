services:
  mock-receiver:
    build:
      context: .
      dockerfile: Dockerfile.mock
    ports:
      - "9090:9090"
    environment:
      LISTEN_ADDR: ":9090"
      TOKEN: "dev-token"

  peon-ping-pong:
    image: ghcr.io/peon-sh/peon-ping-pong:0.0.1
    build:
      context: .
      args:
        VERSION: "0.0.1"
    depends_on:
      - mock-receiver
    environment:
      TOKEN: "dev-token"
      PUSH_ENDPOINT: "http://mock-receiver:9090/api/v1/agents/push"
      SERVER_ID: "local-dev"
      PUSH_INTERVAL_SECONDS: "10"
      DEBUG: "true"
      COLLECTOR_ENABLED: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8888:8888"
    restart: unless-stopped
